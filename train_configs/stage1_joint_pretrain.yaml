## Stage 1: Joint Pre-training on MERCaptionPlus + Human
## Key changes from original:
##   - frozen_llm: False (CRITICAL FIX: LoRA must be trainable)
##   - face_or_frame: multiframe_audio_frame_text (enables multi fusion)
##   - multi_fusion_type: attention (drop CMEF, simpler is better)
##   - lora_r: 16 (increased from 8 for better expressiveness)
##   - contrastive_weight: 0.0 (disable broken contrastive loss for now)
##   - filter_wheel_labels: true (only keep labels in wheel mapping)
##   - hierarchical_supervision: true (answer includes level2/level1 info)
##   - Human dataset: split_role=train, no val split, ratio=1.0

model:
  arch: affectgpt
  model_type: pretrain_vicuna

  frozen_video_proj: False
  frozen_video_Qformer: True
  frozen_audio_Qformer: True
  frozen_audio_proj: False
  frozen_multi_Qformer: False
  frozen_multi_llama_proj: False
  frozen_llm: False

  audio_fusion_type: tpa
  video_fusion_type: tpa
  multi_fusion_type: attention
  image_fusion_type: mean

  tpa_num_heads: 8
  tpa_dropout: 0.1
  tpa_scales: [1, 2, 4]
  num_multi_query_token: 8
  num_video_query_token: 16
  num_audio_query_token: 16
  num_image_query_token: 1

  # Auxiliary emotion classifiers on Qformer outputs
  use_auxiliary_classifiers: false
  auxiliary_loss_weight: 0.3

  # Hierarchical supervision: include level2/level1 in answer
  hierarchical_supervision: true

  # LoRA config (increased rank)
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.1
  lora_target: "attention"

  max_length: 512

  llama_model: "Qwen25"
  acoustic_encoder: "HUBERT_LARGE"
  visual_encoder: "CLIP_VIT_LARGE"

  # Contrastive loss disabled (buggy scaling with accum_grad_iters)
  contrastive_weight: 0.0
  contrastive_temperature: 0.07

  ckpt:   ""
  ckpt_2: ""

  vis_processor:
    train:
      name: "alpro_video_train"
      n_frms: 8
      image_size: 224
  text_processor:
    train:
      name: "blip_caption"
  img_processor:
    train:
      name: "blip2_image_train"
      image_size: 224

datasets:

  mercaptionplus:
    data_type: video
    face_or_frame: 'multiframe_audio_frame_text'
    label_type: 'ovlabel'
    split_role: 'train'
    enable_val_split: true
    val_ratio: 0.1
    split_seed: 42
    ratio: 0.7
    train_monitor_ratio: 0.02
    # NEW: filter out labels not in emotion wheel mapping
    filter_wheel_labels: true

  human:
    data_type: video
    face_or_frame: 'multiframe_audio_frame_text'
    label_type: 'ovlabel'
    split_role: 'train'
    enable_val_split: false
    split_seed: 42
    ratio: 1.0
    train_monitor_ratio: 0.02
    filter_wheel_labels: true

run:

  task: video_text_pretrain

  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 5e-5
  min_lr: 1e-6
  warmup_lr: 1e-6
  weight_decay: 0.05

  max_epoch: 12
  iters_per_epoch: 2000
  warmup_steps: 500

  batch_size_train: 1
  batch_size_eval:  1
  accum_grad_iters: 16

  seed: 42
  num_workers: 4

  amp: True
  resume_ckpt_path: null

  evaluate: False
  train_splits: ["train"]
  monitor_splits: ["train_monitor"]
  valid_splits: ["val"]
  test_splits: ["test"]
  val_freq: 2
  early_stop_patience: 8
  metric_max_new_tokens: 128
  metric_max_samples_by_split:
    train_monitor: 100
    val: 200
    test: 300

  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: False

  output_dir: "output/stage1_joint_pretrain"


inference:

  task: video_text_pretrain

  vis_processor:
    train:
      name: "alpro_video_eval"
      n_frms: 8
      image_size: 224
  text_processor:
    train:
      name: "blip_caption"
  img_processor:
    train:
      name: "blip2_image_eval"
      image_size: 224

  face_or_frame: 'multiframe_audio_frame_text'

  base_root: 'output/results_stage1_joint'
  ckpt_root: xxx
  ckpt_name: xxx
  test_epoch: xxx
  test_epochs: xxx-xxx
  skip_epoch: 1
  gpu: 0
