## TPA + CMEF Innovative Architecture
## TPA: Temporal Pyramid Aggregation (replaces simple attention for audio/video encoding)
## CMEF: Cross-Modal Emotion Fusion (replaces simple attention for multi-modal fusion)

model:
  arch: affectgpt
  model_type: pretrain_vicuna

  # Freeze strategy: unfreeze TPA, CMEF, and LLM LoRA
  frozen_video_proj: False
  frozen_video_Qformer: True
  frozen_audio_Qformer: True
  frozen_audio_proj: False
  frozen_multi_Qformer: True
  frozen_multi_llama_proj: False
  frozen_llm: False

  # New fusion types
  audio_fusion_type: tpa       # tpa replaces attention
  video_fusion_type: tpa       # tpa replaces attention
  multi_fusion_type: cmef      # cmef replaces attention
  image_fusion_type: mean

  # TPA parameters
  tpa_num_heads: 8
  tpa_dropout: 0.1

  # CMEF parameters
  cmef_num_heads: 8
  cmef_num_layers: 2
  cmef_dropout: 0.1

  ckpt:   ""
  ckpt_2: ""

  llama_model: "Qwen25"
  acoustic_encoder: "HUBERT_LARGE"
  visual_encoder: "CLIP_VIT_LARGE"

  num_audio_query_token: 4
  num_video_query_token: 4
  num_multi_query_token: 4
  num_image_query_token: 1

  max_length: 512

  vis_processor:
    train:
      name: "alpro_video_train"
      n_frms: 8
      image_size: 224
  text_processor:
    train:
      name: "blip_caption"
  img_processor:
    train:
      name: "blip2_image_train"
      image_size: 224


datasets:

  human:
    data_type: video
    face_or_frame: 'frame'
    label_type: 'ovlabel'
    split_role: 'train'
    enable_val_split: true
    val_ratio: 0.2
    split_seed: 42
    ratio: 1.0
    train_monitor_ratio: 0.1


run:

  task: video_text_pretrain

  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-5
  min_lr: 1e-6
  warmup_lr: 1e-6
  weight_decay: 0.05

  max_epoch: 20
  iters_per_epoch: 500
  warmup_steps: 500

  batch_size_train: 1
  batch_size_eval:  1

  seed: 42
  num_workers: 4

  amp: True
  resume_ckpt_path: null

  evaluate: False
  train_splits: ["train"]
  monitor_splits: ["train_monitor"]
  valid_splits: ["val"]
  val_freq: 2
  early_stop_patience: 10
  metric_max_new_tokens: 128
  metric_max_samples_by_split:
    train_monitor: 100
    val: 200

  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True


inference:

  task: video_text_pretrain

  vis_processor:
    train:
      name: "alpro_video_eval"
      n_frms: 8
      image_size: 224
  text_processor:
    train:
      name: "blip_caption"
  img_processor:
    train:
      name: "blip2_image_eval"
      image_size: 224

  face_or_frame: 'xxx'

  base_root: 'output/results'
  ckpt_root: xxx
  ckpt_name: xxx
  test_epoch: xxx
  test_epochs: xxx-xxx
  skip_epoch: 1
  gpu: 0
