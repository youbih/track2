## Stage 2: Fine-tune LLM on Human data only
## Purpose: Align LLM generation with human annotation style
## Load Stage 1 best checkpoint, freeze CMEF, unfreeze LLM
## Use higher LoRA rank for more capacity
##
## Three validation sets (only human data in Stage 2):
##   - human_val: Human only (target distribution)
##   - val: Same as human_val (alias for compatibility)

model:
  arch: affectgpt
  model_type: pretrain_vicuna

  frozen_video_proj: False
  frozen_video_Qformer: True
  frozen_audio_Qformer: True
  frozen_audio_proj: False
  frozen_multi_Qformer: False
  frozen_multi_llama_proj: False
  frozen_llm: False         # Stage 2: unfreeze LLM
  frozen_cmef: True         # Stage 2: freeze CMEF (keep Stage 1 fusion)

  audio_fusion_type: tpa
  video_fusion_type: tpa
  multi_fusion_type: cmef   # Keep CMEF but frozen
  image_fusion_type: mean

  tpa_num_heads: 8
  tpa_dropout: 0.1
  tpa_scales: [1, 2, 4]
  cmef_num_heads: 8
  cmef_num_layers: 2        # Must match Stage 1
  cmef_dropout: 0.1
  num_emotion_prototypes: 8
  contrastive_weight: 0.0   # Remove contrastive loss, focus on generation
  contrastive_temperature: 0.07

  lora_r: 16                # Higher rank for LLM fine-tuning
  lora_alpha: 32
  lora_dropout: 0.1
  lora_target: "attention"

  max_length: 512

  llama_model: "Qwen25"
  acoustic_encoder: "HUBERT_LARGE"
  visual_encoder: "CLIP_VIT_LARGE"

  num_audio_query_token: 16
  num_video_query_token: 16
  num_multi_query_token: 8
  num_image_query_token: 1

  ckpt: ""                  # Loaded via resume_ckpt_path
  ckpt_2: ""

  vis_processor:
    train:
      name: "alpro_video_train"
      n_frms: 8
      image_size: 224
  text_processor:
    train:
      name: "blip_caption"
  img_processor:
    train:
      name: "blip2_image_train"
      image_size: 224

datasets:
  human:
    data_type: video
    face_or_frame: 'frame'
    label_type: 'ovlabel'
    split_role: 'train'
    enable_val_split: true
    val_ratio: 0.15
    split_seed: 42
    ratio: 1.0
    train_monitor_ratio: 0.05
    filter_wheel_labels: true
    split_prefix: "human_"

run:
  task: video_text_pretrain
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-5
  min_lr: 1e-7
  warmup_lr: 1e-7
  weight_decay: 0.05
  max_epoch: 8
  iters_per_epoch: 1000
  warmup_steps: 100
  batch_size_train: 1
  batch_size_eval: 1
  accum_grad_iters: 16
  seed: 42
  num_workers: 4
  amp: True
  resume_ckpt_path: null
  evaluate: False
  train_splits: ["train"]
  monitor_splits: ["train_monitor"]
  valid_splits: ["val", "human_val"]
  test_splits: ["test"]
  val_freq: 1
  early_stop_patience: 6
  metric_max_new_tokens: 128
  metric_max_samples_by_split:
    train_monitor: 100
    val: 200
    human_val: 200
    test: 300
  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: False
  output_dir: "output/method_a_stage2"

inference:
  task: video_text_pretrain
  vis_processor:
    train:
      name: "alpro_video_eval"
      n_frms: 8
      image_size: 224
  text_processor:
    train:
      name: "blip_caption"
  img_processor:
    train:
      name: "blip2_image_eval"
      image_size: 224
  face_or_frame: 'frame'
  base_root: 'output/results_method_a_stage2'
  ckpt_root: xxx
  ckpt_name: xxx
  test_epoch: xxx
  test_epochs: xxx-xxx
  skip_epoch: 1
  gpu: 0
