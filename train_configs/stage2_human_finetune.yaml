## Stage 2: Fine-tuning on Human dataset only
## Load from stage1 best checkpoint and fine-tune with lower learning rate
## All trainable modules remain unfrozen

model:
  arch: affectgpt
  model_type: pretrain_vicuna

  frozen_video_proj: False
  frozen_video_Qformer: True
  frozen_audio_Qformer: True
  frozen_audio_proj: False
  frozen_multi_Qformer: False
  frozen_multi_llama_proj: False
  frozen_llm: False

  audio_fusion_type: tpa
  video_fusion_type: tpa
  multi_fusion_type: attention
  image_fusion_type: mean

  tpa_num_heads: 8
  tpa_dropout: 0.1
  tpa_scales: [1, 2, 4]
  num_multi_query_token: 8
  num_video_query_token: 16
  num_audio_query_token: 16
  num_image_query_token: 1

  use_auxiliary_classifiers: false
  auxiliary_loss_weight: 0.3

  hierarchical_supervision: true

  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.1
  lora_target: "attention"

  max_length: 512

  llama_model: "Qwen25"
  acoustic_encoder: "HUBERT_LARGE"
  visual_encoder: "CLIP_VIT_LARGE"

  contrastive_weight: 0.0
  contrastive_temperature: 0.07

  # Load stage1 best checkpoint
  ckpt: "output/stage1_joint_pretrain/stage1_joint_pretrain_*/checkpoint_best.pth"
  ckpt_2: ""

  vis_processor:
    train:
      name: "alpro_video_train"
      n_frms: 8
      image_size: 224
  text_processor:
    train:
      name: "blip_caption"
  img_processor:
    train:
      name: "blip2_image_train"
      image_size: 224

datasets:

  human:
    data_type: video
    face_or_frame: 'multiframe_audio_frame_text'
    label_type: 'ovlabel'
    split_role: 'train'
    enable_val_split: true
    val_ratio: 0.15
    split_seed: 42
    ratio: 1.0
    train_monitor_ratio: 0.05
    filter_wheel_labels: true

run:

  task: video_text_pretrain

  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-5
  min_lr: 1e-7
  warmup_lr: 1e-7
  weight_decay: 0.05

  max_epoch: 8
  iters_per_epoch: 2000
  warmup_steps: 100

  batch_size_train: 1
  batch_size_eval:  1
  accum_grad_iters: 16

  seed: 42
  num_workers: 4

  amp: True
  resume_ckpt_path: null

  evaluate: False
  train_splits: ["train"]
  monitor_splits: ["train_monitor"]
  valid_splits: ["val"]
  test_splits: ["test"]
  val_freq: 1
  early_stop_patience: 6
  metric_max_new_tokens: 128
  metric_max_samples_by_split:
    train_monitor: 100
    val: 200
    test: 300

  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: False

  output_dir: "output/stage2_human_finetune"


inference:

  task: video_text_pretrain

  vis_processor:
    train:
      name: "alpro_video_eval"
      n_frms: 8
      image_size: 224
  text_processor:
    train:
      name: "blip_caption"
  img_processor:
    train:
      name: "blip2_image_eval"
      image_size: 224

  face_or_frame: 'multiframe_audio_frame_text'

  base_root: 'output/results_stage2_human'
  ckpt_root: xxx
  ckpt_name: xxx
  test_epoch: xxx
  test_epochs: xxx-xxx
  skip_epoch: 1
  gpu: 0
